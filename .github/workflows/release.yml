name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # necesario para crear releases

jobs:
  build:
    name: Build Windows .exe + draft release
    runs-on: windows-latest
    env:
      FLASK_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint antes del build
        run: ruff check .

      - name: Build con PyInstaller
        run: pyinstaller gesdai_exporter.spec

      - name: Calcular SHA-256
        id: hash
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\*.exe | Select-Object -First 1
          if (-not $exe) { throw "No se encontró ningún .exe en dist/" }
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe_name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "$hash  $($exe.Name)" | Out-File -FilePath "$($exe.FullName).sha256" -Encoding ascii -NoNewline

      - name: Crear draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.hash.outputs.sha256 }}
          EXE_NAME: ${{ steps.hash.outputs.exe_name }}
          EXE_PATH: ${{ steps.hash.outputs.exe_path }}
        run: |
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --generate-notes \
            --notes "## Build $TAG

          **SHA-256:** \`$SHA\`

          El updater verifica este hash antes de reemplazar el binario en el cliente.

          > Repositorio privado: el cliente necesita un token de GitHub con permiso \`contents:read\` para descargar el asset. Ver \`updater/README.md\` (pendiente) para el flujo de autenticación." \
            "$EXE_PATH" \
            "$EXE_PATH.sha256"

      - name: Subir .exe como artifact (diagnóstico)
        uses: actions/upload-artifact@v4
        with:
          name: gesdai-exporter-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.exe.sha256
          retention-days: 14
